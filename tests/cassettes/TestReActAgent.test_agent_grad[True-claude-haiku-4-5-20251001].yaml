        (number): No description provided.\n\nNAME: get_random_int\n\nSYNOPSIS:\n    get_random_int()\n\nDESCRIPTION:\n    Get
        a random integer in 1 to 10.\n\nPARAMETERS:\n\nUse the following format:\n\nThought:
